<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Page Not Found</title>
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#f7f9fc">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f9fc;
      --bg-accent: #eef4fb;
      --surface: rgba(255, 255, 255, 0.94);
      --text: #142033;
      --muted: #5f6f84;
      --line: rgba(15, 23, 42, 0.1);
      --brand: #0f172a;
      --brand-soft: #e9eef7;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(90, 167, 255, 0.08), transparent 26%),
        linear-gradient(180deg, var(--bg), var(--bg-accent));
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }

    .shell {
      width: min(920px, 100%);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: clamp(1.8rem, 4vw, 3.5rem);
    }

    .eyebrow {
      display: inline-block;
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      background: var(--brand-soft);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(180px, 0.8fr);
      gap: 2rem;
      align-items: center;
      margin-top: 1.25rem;
    }

    h1 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(2.7rem, 8vw, 5rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .title {
      display: grid;
      gap: 0.75rem;
    }

    .subtitle {
      font-size: clamp(1.05rem, 2vw, 1.2rem);
      font-weight: 700;
      color: var(--text);
    }

    p {
      margin: 0;
      max-width: 34rem;
      color: var(--muted);
      line-height: 1.8;
      font-size: 1rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      margin-top: 1.6rem;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 3.1rem;
      padding: 0 1.2rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .button:hover,
    .button:focus-visible {
      transform: translateY(-1px);
    }

    .button-primary {
      background: var(--brand);
      color: #ffffff;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.14);
    }

    .button-secondary {
      background: #ffffff;
      color: var(--text);
    }

    .visual {
      display: grid;
      place-items: center;
    }

    .badge {
      width: min(100%, 220px);
      aspect-ratio: 1 / 1;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff, #f3f6fb);
      display: grid;
      place-items: center;
    }

    .badge span {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(3rem, 8vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.08em;
      color: #243247;
    }

    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1.2rem;
    }

    .quick-links a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
    }

    .quick-links a:hover,
    .quick-links a:focus-visible {
      color: var(--text);
    }

    @media (max-width: 760px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .visual {
        order: -1;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card">
      <span class="eyebrow">Page Not Found</span>

      <div class="layout">
        <div>
          <div class="title">
            <h1>404</h1>
            <div class="subtitle">This page is not available.</div>
            <p>The link may be outdated, or the page may have been moved. You can return to the portfolio homepage or jump directly to the projects section.</p>
          </div>

          <div class="actions">
            <a class="button button-primary" href="/index.html">Back Home</a>
            <a class="button button-secondary" href="/index.html#projects">View Projects</a>
          </div>

          <div class="quick-links">
            <a href="/index.html#about">About</a>
            <a href="/index.html#skills">Skills</a>
            <a href="/index.html#contact">Contact</a>
          </div>
        </div>

        <div class="visual" aria-hidden="true">
          <div class="badge">
            <span>404</span>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
