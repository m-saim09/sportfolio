<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Page Not Found</title>
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#f8fafc">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --bg-soft: #eef4ff;
      --text: #0f172a;
      --muted: #5b677a;
      --line: rgba(15, 23, 42, 0.08);
      --button: #2458ff;
      --button-hover: #1747e6;
      --shadow: 0 24px 60px rgba(37, 99, 235, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.1), transparent 28%),
        linear-gradient(180deg, #ffffff, var(--bg));
      display: grid;
      place-items: center;
      padding: 2rem 1.25rem;
    }

    .shell {
      width: min(780px, 100%);
      text-align: center;
    }

    .oops {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(4.6rem, 14vw, 10rem);
      line-height: 0.88;
      letter-spacing: -0.08em;
      font-weight: 700;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.7), transparent 22%),
        linear-gradient(135deg, #1d4ed8, #4f46e5 45%, #7c3aed 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 10px 30px rgba(79, 70, 229, 0.08);
    }

    .face {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 4rem;
      height: 4rem;
      margin: 0 auto 1.1rem;
      border-radius: 999px;
      background: var(--bg-soft);
      color: #3658d4;
      font-size: 1.6rem;
      font-weight: 800;
      box-shadow: inset 0 0 0 1px rgba(36, 88, 255, 0.08);
    }

    .meta {
      margin-top: 1rem;
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .submeta {
      margin-top: 0.45rem;
      font-size: 0.94rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #334155;
    }

    .copy {
      max-width: 34rem;
      margin: 1rem auto 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 1rem;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 0.9rem;
      flex-wrap: wrap;
      margin-top: 2rem;
    }

    .button {
      min-width: 190px;
      min-height: 3.35rem;
      padding: 0 1.4rem;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-weight: 800;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .button:hover,
    .button:focus-visible {
      transform: translateY(-1px);
    }

    .button-primary {
      background: linear-gradient(135deg, var(--button), #3b82f6);
      color: #ffffff;
      box-shadow: var(--shadow);
    }

    .button-primary:hover,
    .button-primary:focus-visible {
      background: linear-gradient(135deg, var(--button-hover), #2563eb);
    }

    .button-secondary {
      background: #ffffff;
      color: var(--text);
      box-shadow: inset 0 0 0 1px var(--line);
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1.3rem;
    }

    .links a {
      color: #516074;
      text-decoration: none;
      font-weight: 700;
    }

    .links a:hover,
    .links a:focus-visible {
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="face" aria-hidden="true">:(</div>
    <h1 class="oops">Oops!</h1>
    <div class="meta">404 - Page Not Found</div>
    <div class="submeta">The page you requested could not be found</div>
    <p class="copy">The link may be broken, the page may have moved, or the URL might be incorrect. You can head back to the homepage or continue exploring featured work from the portfolio.</p>

    <div class="actions">
      <a class="button button-primary" href="/index.html">Go To Homepage</a>
    </div>

    <div class="links">
      <a href="/index.html#about">About</a>
      <a href="/index.html#skills">Skills</a>
      <a href="/index.html#contact">Contact</a>
    </div>
  </main>
</body>
</html>
