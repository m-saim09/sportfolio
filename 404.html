<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Page Not Found</title>
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#08111f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --surface: rgba(14, 24, 43, 0.86);
      --surface-strong: rgba(10, 19, 35, 0.96);
      --text: #f8fafc;
      --muted: #94a3b8;
      --line: rgba(148, 163, 184, 0.18);
      --brand: #3dd9b3;
      --brand-secondary: #5aa7ff;
      --shadow: 0 24px 80px rgba(2, 8, 23, 0.4);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 18%, rgba(90, 167, 255, 0.18), transparent 24%),
        radial-gradient(circle at 82% 22%, rgba(61, 217, 179, 0.16), transparent 24%),
        linear-gradient(180deg, rgba(8, 17, 31, 0.96), rgba(8, 17, 31, 1));
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 76px 76px;
      mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.85), transparent 92%);
      pointer-events: none;
    }

    .shell {
      width: min(1120px, calc(100% - 2rem));
    }

    .card {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(260px, 0.9fr);
      gap: 2rem;
      align-items: center;
      padding: clamp(1.6rem, 3vw, 3rem);
      border-radius: 32px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
      backdrop-filter: blur(22px);
      box-shadow: var(--shadow);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: auto -10% -18% auto;
      width: 16rem;
      height: 16rem;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(61, 217, 179, 0.28), transparent 68%);
      filter: blur(24px);
      pointer-events: none;
    }

    .copy {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.6rem 0.95rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(8, 17, 31, 0.52);
      color: var(--muted);
      font-size: 0.84rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 1rem 0 0.8rem;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(2.6rem, 7vw, 5.4rem);
      line-height: 0.94;
      letter-spacing: -0.05em;
    }

    p {
      margin: 0;
      max-width: 36rem;
      color: var(--muted);
      line-height: 1.8;
      font-size: 1.02rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      min-height: 3.2rem;
      padding: 0 1.35rem;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .button:hover,
    .button:focus-visible {
      transform: translateY(-2px);
    }

    .button-primary {
      background: linear-gradient(135deg, var(--brand), var(--brand-secondary));
      color: #08111f;
      box-shadow: 0 18px 45px rgba(90, 167, 255, 0.22);
    }

    .button-secondary {
      background: rgba(8, 17, 31, 0.58);
      color: var(--text);
      border-color: var(--line);
    }

    .visual {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      min-height: 100%;
    }

    .badge {
      width: min(100%, 320px);
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      border-radius: 32px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 30% 30%, rgba(90, 167, 255, 0.2), transparent 28%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
    }

    .badge-inner {
      width: 76%;
      aspect-ratio: 1 / 1;
      border-radius: 28px;
      display: grid;
      place-items: center;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(3rem, 9vw, 5.5rem);
      letter-spacing: -0.08em;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .quick-links a {
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .quick-links a:hover,
    .quick-links a:focus-visible {
      color: var(--text);
      border-color: rgba(90, 167, 255, 0.4);
    }

    @media (max-width: 860px) {
      .card {
        grid-template-columns: 1fr;
      }

      .visual {
        order: -1;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card">
      <div class="copy">
        <span class="eyebrow">
          <i class="fa-solid fa-compass"></i>
          Lost In The Portfolio
        </span>
        <h1>404</h1>
        <p>The page you are looking for is not available. You can head back to the portfolio, jump to the projects section, or reach out directly if you were trying to find something specific.</p>
        <div class="actions">
          <a class="button button-primary" href="/index.html">
            <i class="fa-solid fa-house"></i>
            Back Home
          </a>
          <a class="button button-secondary" href="/index.html#projects">
            <i class="fa-solid fa-layer-group"></i>
            View Projects
          </a>
        </div>
        <div class="quick-links">
          <a href="/index.html#contact">Contact</a>
          <a href="/index.html#about">About</a>
          <a href="/index.html#skills">Skills</a>
        </div>
      </div>

      <div class="visual" aria-hidden="true">
        <div class="badge">
          <div class="badge-inner">/?</div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
