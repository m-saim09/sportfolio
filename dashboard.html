<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Admin Dashboard</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --panel: rgba(13, 22, 39, 0.92);
      --line: rgba(148, 163, 184, 0.18);
      --text: #f8fafc;
      --muted: #94a3b8;
      --brand: #3dd9b3;
      --brand-2: #5aa7ff;
      --danger: #f87171;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(90, 167, 255, 0.16), transparent 32%),
        linear-gradient(180deg, #08111f, #0b1527);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      width: min(1180px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 3rem;
    }

    .hero,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 80px rgba(2, 8, 23, 0.3);
    }

    .hero {
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .hero h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 0.8rem;
      margin-top: 1.25rem;
    }

    .controls input,
    .controls button {
      min-height: 3rem;
      border-radius: 14px;
      border: 1px solid var(--line);
      font: inherit;
    }

    .controls input {
      background: rgba(8, 17, 31, 0.9);
      color: var(--text);
      padding: 0 1rem;
    }

    .controls button {
      cursor: pointer;
      padding: 0 1rem;
      font-weight: 700;
    }

    .primary {
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: #08111f;
    }

    .secondary {
      background: rgba(8, 17, 31, 0.9);
      color: var(--text);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1.5rem;
    }

    .panel {
      padding: 1.25rem;
    }

    .panel h2 {
      margin: 0 0 0.4rem;
      font-size: 1.2rem;
    }

    .subtle {
      margin: 0 0 1rem;
      color: var(--muted);
    }

    .status {
      min-height: 1.4rem;
      margin: 0.8rem 0 0;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    .list {
      display: grid;
      gap: 1rem;
      max-height: 70vh;
      overflow: auto;
      padding-right: 0.35rem;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(8, 17, 31, 0.78);
      padding: 1rem;
    }

    .card strong {
      display: block;
      margin-bottom: 0.35rem;
    }

    .meta,
    .empty {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .message {
      margin-top: 0.7rem;
      white-space: pre-wrap;
      line-height: 1.7;
    }

    @media (max-width: 860px) {
      .controls,
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Portfolio Admin Dashboard</h1>
      <p>Use your admin token to load saved contact submissions and chat history from server-side storage.</p>
      <div class="controls">
        <input id="tokenInput" type="password" placeholder="Enter ADMIN_DASHBOARD_TOKEN">
        <button id="saveTokenButton" class="primary" type="button">Load Data</button>
        <button id="clearTokenButton" class="secondary" type="button">Clear Token</button>
      </div>
      <p id="status" class="status"></p>
    </section>

    <section class="grid">
      <article class="panel">
        <h2>Contact Submissions</h2>
        <p class="subtle">Newest submissions appear first.</p>
        <div id="submissionsList" class="list"></div>
      </article>

      <article class="panel">
        <h2>Chat History</h2>
        <p class="subtle">Stored user and assistant exchanges across visitors.</p>
        <div id="chatList" class="list"></div>
      </article>
    </section>
  </main>

  <script>
    const tokenStorageKey = "portfolio-admin-token";
    const tokenInput = document.getElementById("tokenInput");
    const saveTokenButton = document.getElementById("saveTokenButton");
    const clearTokenButton = document.getElementById("clearTokenButton");
    const status = document.getElementById("status");
    const submissionsList = document.getElementById("submissionsList");
    const chatList = document.getElementById("chatList");

    tokenInput.value = localStorage.getItem(tokenStorageKey) || "";

    const setStatus = (message, isError = false) => {
      status.textContent = message;
      status.classList.toggle("error", isError);
    };

    const formatDate = (value) => {
      if (!value) return "Unknown time";
      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? value : parsed.toLocaleString();
    };

    const renderEmpty = (target, label) => {
      target.innerHTML = `<div class="empty">${label}</div>`;
    };

    const renderSubmissions = (submissions) => {
      if (!submissions.length) {
        renderEmpty(submissionsList, "No contact submissions saved yet.");
        return;
      }

      submissionsList.innerHTML = submissions.map((submission) => `
        <article class="card">
          <strong>${submission.name || "Unknown sender"}</strong>
          <div class="meta">${submission.email || "No email"} | ${submission.subject || "No subject"}</div>
          <div class="meta">${formatDate(submission.createdAt)}</div>
          <div class="message">${submission.message || ""}</div>
        </article>
      `).join("");
    };

    const renderChats = (messages) => {
      if (!messages.length) {
        renderEmpty(chatList, "No chat history saved yet.");
        return;
      }

      chatList.innerHTML = messages.map((entry) => `
        <article class="card">
          <strong>Session: ${entry.sessionId || "unknown"}</strong>
          <div class="meta">${formatDate(entry.createdAt)}</div>
          <div class="message"><strong>User:</strong> ${entry.question || ""}</div>
          <div class="message"><strong>Assistant:</strong> ${entry.answer || ""}</div>
        </article>
      `).join("");
    };

    const fetchJson = async (url, token) => {
      const response = await fetch(url, {
        headers: {
          Authorization: `Bearer ${token}`
        }
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.error || "Request failed");
      }

      return data;
    };

    const loadData = async () => {
      const token = tokenInput.value.trim();
      if (!token) {
        setStatus("Admin token required.", true);
        return;
      }

      localStorage.setItem(tokenStorageKey, token);
      setStatus("Loading saved records...");

      try {
        const [submissions, chats] = await Promise.all([
          fetchJson("/api/admin/submissions", token),
          fetchJson("/api/admin/chat-history", token)
        ]);

        renderSubmissions(submissions.submissions || []);
        renderChats(chats.messages || []);
        setStatus("Saved records loaded.");
      } catch (error) {
        renderEmpty(submissionsList, "Unable to load submissions.");
        renderEmpty(chatList, "Unable to load chat history.");
        setStatus(error.message || "Unable to load data.", true);
      }
    };

    saveTokenButton.addEventListener("click", loadData);
    clearTokenButton.addEventListener("click", () => {
      localStorage.removeItem(tokenStorageKey);
      tokenInput.value = "";
      renderEmpty(submissionsList, "Token cleared. Load data to view submissions.");
      renderEmpty(chatList, "Token cleared. Load data to view chat history.");
      setStatus("Token cleared.");
    });

    renderEmpty(submissionsList, "Enter the admin token to load submissions.");
    renderEmpty(chatList, "Enter the admin token to load chat history.");

    if (tokenInput.value) {
      loadData();
    }
  </script>
</body>
</html>
